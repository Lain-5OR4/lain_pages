    <rect x="660" y="320" width="10" height="10"/> <rect x="710" y="320" width="10" height="10"/>
    <rect x="635" y="350" width="10" height="10"/> <rect x="660" y="350" width="10" height="10"/> <rect x="710" y="350" width="10" height="10"/>
