  <circle cx="700" cy="40" r="1.5" fill="#fff" opacity="0.7"/>
  <circle cx="150" cy="120" r="1" fill="#fff" opacity="0.4"/>
  <circle cx="650" cy="100" r="1.5" fill="#fff" opacity="0.6"/>
  <circle cx="350" cy="90" r="1" fill="#fff" opacity="0.5"/>
