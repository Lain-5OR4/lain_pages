    <rect x="235" y="250" width="10" height="10"/> <rect x="285" y="250" width="10" height="10"/>
    <rect x="260" y="280" width="10" height="10"/> <rect x="235" y="310" width="10" height="10"/> <rect x="285" y="310" width="10" height="10"/>
    <rect x="235" y="340" width="10" height="10"/> <rect x="260" y="340" width="10" height="10"/>
    <rect x="445" y="240" width="10" height="10"/> <rect x="470" y="240" width="10" height="10"/> <rect x="495" y="240" width="10" height="10"/>
    <rect x="445" y="270" width="10" height="10"/> <rect x="495" y="270" width="10" height="10"/>
