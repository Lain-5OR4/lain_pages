<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="wetground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f0f1a"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="#0a0a14"/>
  <!-- road -->
  <polygon points="200,250 600,250 800,600 0,600" fill="url(#wetground)"/>
  <line x1="400" y1="250" x2="400" y2="600" stroke="#333" stroke-width="2" stroke-dasharray="20,15"/>
  <!-- puddle reflections -->
  <ellipse cx="300" cy="480" rx="80" ry="15" fill="#22c55e" opacity="0.08"/>
  <ellipse cx="550" cy="520" rx="60" ry="10" fill="#ff00ff" opacity="0.06"/>
  <!-- buildings silhouette -->
  <rect x="0" y="100" width="150" height="200" fill="#0d0d18"/>
  <rect x="160" y="130" width="100" height="170" fill="#0d0d18"/>
  <rect x="540" y="80" width="120" height="220" fill="#0d0d18"/>
  <rect x="670" y="120" width="130" height="180" fill="#0d0d18"/>
  <!-- neon lights on buildings -->
  <rect x="20" y="180" width="40" height="5" fill="#ff00ff" opacity="0.7"/>
  <rect x="80" y="200" width="30" height="5" fill="#00ffff" opacity="0.6"/>
  <rect x="560" y="150" width="50" height="5" fill="#22c55e" opacity="0.7"/>
  <rect x="700" y="170" width="35" height="5" fill="#ff6b00" opacity="0.5"/>
  <!-- street lamps -->
  <line x1="250" y1="180" x2="250" y2="350" stroke="#444" stroke-width="3"/>
  <circle cx="250" cy="178" r="8" fill="#ffcc00" opacity="0.6"/>
  <circle cx="250" cy="178" r="20" fill="#ffcc00" opacity="0.1"/>
  <line x1="580" y1="180" x2="580" y2="380" stroke="#444" stroke-width="3"/>
  <circle cx="580" cy="178" r="8" fill="#ffcc00" opacity="0.6"/>
  <circle cx="580" cy="178" r="20" fill="#ffcc00" opacity="0.1"/>
  <!-- rain -->
  <g stroke="#88ccee" stroke-width="1" opacity="0.3">
    <line x1="50" y1="0" x2="40" y2="60"/> <line x1="120" y1="20" x2="110" y2="80"/>
    <line x1="200" y1="10" x2="190" y2="70"/> <line x1="300" y1="30" x2="290" y2="90"/>
    <line x1="380" y1="0" x2="370" y2="60"/> <line x1="450" y1="15" x2="440" y2="75"/>
    <line x1="530" y1="5" x2="520" y2="65"/> <line x1="620" y1="25" x2="610" y2="85"/>
    <line x1="700" y1="0" x2="690" y2="60"/> <line x1="770" y1="20" x2="760" y2="80"/>
    <line x1="80" y1="100" x2="70" y2="160"/> <line x1="170" y1="110" x2="160" y2="170"/>
    <line x1="260" y1="90" x2="250" y2="150"/> <line x1="350" y1="120" x2="340" y2="180"/>
    <line x1="440" y1="95" x2="430" y2="155"/> <line x1="500" y1="105" x2="490" y2="165"/>
    <line x1="590" y1="100" x2="580" y2="160"/> <line x1="680" y1="115" x2="670" y2="175"/>
    <line x1="100" y1="200" x2="90" y2="260"/> <line x1="320" y1="210" x2="310" y2="270"/>
    <line x1="480" y1="190" x2="470" y2="250"/> <line x1="650" y1="205" x2="640" y2="265"/>
    <line x1="750" y1="195" x2="740" y2="255"/>
  </g>
  <!-- vending machine -->
  <rect x="660" y="300" width="40" height="60" rx="3" fill="#1a1a3a" stroke="#22c55e" stroke-width="1"/>
  <rect x="665" y="305" width="30" height="20" fill="#22c55e" opacity="0.3"/>
  <text x="672" y="350" font-family="monospace" font-size="6" fill="#22c55e" opacity="0.8">自販機</text>
</svg>
