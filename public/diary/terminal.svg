<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <rect width="800" height="600" fill="#0a0a0a"/>
  <!-- terminal window -->
  <rect x="60" y="40" width="680" height="520" rx="8" fill="#111" stroke="#333" stroke-width="2"/>
  <!-- title bar -->
  <rect x="60" y="40" width="680" height="35" rx="8" fill="#222"/>
  <rect x="60" y="60" width="680" height="15" fill="#222"/>
  <circle cx="85" cy="57" r="7" fill="#ff5f57"/>
  <circle cx="110" cy="57" r="7" fill="#ffbd2e"/>
  <circle cx="135" cy="57" r="7" fill="#28c840"/>
  <text x="370" y="62" text-anchor="middle" font-family="monospace" font-size="13" fill="#888">~/diary — zsh</text>
  <!-- terminal content -->
  <g font-family="monospace" font-size="14" fill="#22c55e">
    <text x="80" y="110">$ cat thoughts.md</text>
    <text x="80" y="140" fill="#22c55e" opacity="0.7"># 今日の記録</text>
    <text x="80" y="170" fill="#22c55e" opacity="0.6">新しいプロジェクトを始めた。</text>
    <text x="80" y="200" fill="#22c55e" opacity="0.6">コードを書くのは楽しい。</text>
    <text x="80" y="230" fill="#22c55e" opacity="0.6">深夜のコーディングは最高。</text>
    <text x="80" y="270">$ ls -la ./memories/</text>
    <text x="80" y="300" fill="#00bcd4">drwxr-xr-x  dreams/</text>
    <text x="80" y="325" fill="#00bcd4">drwxr-xr-x  ideas/</text>
    <text x="80" y="350" fill="#aaa">-rw-r--r--  config.yaml</text>
    <text x="80" y="375" fill="#aaa">-rw-r--r--  notes.txt</text>
    <text x="80" y="415">$ echo "Hello, Wired"</text>
    <text x="80" y="445" fill="#fff">Hello, Wired</text>
    <text x="80" y="485">$ █</text>
  </g>
</svg>
